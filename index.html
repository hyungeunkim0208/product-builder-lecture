<!DOCTYPE html>
<!-- <html lang="en"> -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Face Test (Dog or Cat?)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Dark Mode</button>
    </div>

    <div class="container">
        <h1>Animal Face Test</h1>
        <p class="subtitle">Am I a Dog or a Cat?</p>

        <!-- Upload Section -->
        <div id="upload-section">
            <div id="upload-area" class="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <label for="image-input" class="upload-label">
                    <div class="upload-icon">📂</div>
                    <span>Click or Drag to Upload Photo</span>
                </label>
                <img id="preview-image" src="#" alt="Preview" style="display: none;">
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing face...</p>
        </div>

        <div id="result-area" class="result-area" style="display: none;">
            <h2 id="result-title">Result</h2>
            <div id="label-container" class="label-container"></div>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <div class="container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/maqkplbo" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>
    </div>

    <div class="container">
        <h2>Comments</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-mnwekwsniw.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
    </div>

    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
