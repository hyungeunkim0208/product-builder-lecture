<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Dark Mode</button>
    </div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div id="numbers" class="numbers-container">
            <!-- Numbers will be displayed here -->
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/maqkplbo" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
